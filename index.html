<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>せんだい地下鉄 南北線 発車案内</title>
<style>
  :root{
    --bg: #0a0d0e;
    --panel: #14191b;
    --panel-2: #1b2123;
    --line: #232a2c;
    --nanboku: #1fae64;
    --nanboku-dim: #163d2a;
    --tozai: #f29400;
    --tozai-dim: #4a3107;
    --text: #f2efe6;
    --text-dim: #8a949a;
    --amber: #ffc83d;
    --danger: #ff5d5d;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:-apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    min-height:100vh;
  }
  .mono{
    font-family: "SF Mono", "SFMono-Regular", Menlo, Consolas, "Roboto Mono", monospace;
    font-variant-numeric: tabular-nums;
  }
  .wrap{
    max-width:560px; margin:0 auto; padding:env(safe-area-inset-top) 14px 40px;
    min-height:100vh; display:flex; flex-direction:column;
  }

  /* ---- ヘッダー ---- */
  .topbar{
    padding:18px 2px 14px; position:relative; overflow:hidden;
  }
  .topbar::before{
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background-image: radial-gradient(circle, rgba(255,255,255,.05) 1px, transparent 1.4px);
    background-size: 7px 7px;
    mask-image: linear-gradient(to bottom, black, transparent 85%);
  }
  .eyebrow{
    font-size:11px; letter-spacing:.18em; color:var(--text-dim); text-transform:uppercase;
    display:flex; align-items:center; gap:8px;
  }
  .eyebrow .dot{ width:6px; height:6px; border-radius:50%; background:var(--amber); }
  h1{
    margin:6px 0 2px; font-size:26px; font-weight:800; letter-spacing:.01em; line-height:1.25;
  }
  .clock-row{
    display:flex; align-items:baseline; gap:10px; margin-top:6px; flex-wrap:wrap;
  }
  .clock{ font-size:15px; color:var(--text-dim); }
  .clock b{ color:var(--text); font-weight:700; }
  .sched-tag{
    font-size:11px; padding:3px 8px; border-radius:999px; border:1px solid var(--line);
    color:var(--text-dim); letter-spacing:.04em;
  }
  .sched-tag.holiday{ color:var(--amber); border-color: rgba(255,200,61,.35); }

  /* ---- 状態表示 / コントロール ---- */
  .status{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; margin-top:14px; font-size:13px; color:var(--text-dim);
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .status b{ color:var(--text); }
  .btn{
    appearance:none; border:1px solid var(--line); background:var(--panel-2); color:var(--text);
    font-size:12px; padding:8px 12px; border-radius:10px; white-space:nowrap;
  }
  .btn:active{ transform: scale(.97); }

  select.station-pick{
    width:100%; margin-top:10px; appearance:none; -webkit-appearance:none;
    background:var(--panel-2) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%238a949a" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>') no-repeat right 14px center;
    color:var(--text); border:1px solid var(--line); border-radius:10px;
    padding:11px 36px 11px 14px; font-size:14px;
  }

  /* ---- 駅見出し ---- */
  .station-head{
    margin:22px 2px 10px; display:flex; align-items:baseline; justify-content:space-between;
  }
  .station-head .name{ font-size:21px; font-weight:800; }
  .station-head .dist{ font-size:12px; color:var(--text-dim); }

  /* ---- 路線ブロック ---- */
  .line-block{
    border-radius:16px; overflow:hidden; margin-bottom:16px;
    border:1px solid var(--line); background:var(--panel);
  }
  .line-title{
    display:flex; align-items:center; gap:9px; padding:11px 14px;
    font-size:13px; font-weight:700; letter-spacing:.02em;
    background-image: radial-gradient(circle, rgba(255,255,255,.06) 1px, transparent 1.4px);
    background-size: 8px 8px;
  }
  .line-block.nanboku .line-title{ background-color: var(--nanboku-dim); color:#7fe3ab; }
  .line-block.tozai .line-title{ background-color: var(--tozai-dim); color:#ffc269; }
  .line-badge{
    font-size:11px; padding:2px 8px; border-radius:6px; font-weight:800;
  }
  .line-block.nanboku .line-badge{ background:var(--nanboku); color:#06170e; }
  .line-block.tozai .line-badge{ background:var(--tozai); color:#1c1100; }

  .row{
    display:flex; align-items:center; gap:10px; padding:12px 14px;
    border-top:1px solid var(--line);
  }
  .row:first-child{ border-top:none; }
  .row .rank{
    width:18px; flex:0 0 18px; font-size:11px; color:var(--text-dim); text-align:center;
  }
  .row .dest{ flex:1; font-size:14.5px; font-weight:600; }
  .row .day-tag{
    font-size:10px; color:var(--text-dim); border:1px solid var(--line);
    padding:1px 6px; border-radius:999px; margin-right:2px;
  }
  .row .time{ font-size:19px; font-weight:700; letter-spacing:.02em; }
  .row .eta{
    width:64px; flex:0 0 64px; text-align:right; font-size:12px; color:var(--text-dim);
  }
  .row.soon{ background: rgba(255,200,61,.06); }
  .row.soon .time{ color:var(--amber); }
  .row.soon .eta{ color:var(--amber); font-weight:700; }
  .row.soon .eta .blink{ display:inline-block; animation: blink 1.1s ease-in-out infinite; }
  @keyframes blink{ 0%,100%{ opacity:1 } 50%{ opacity:.35 } }

  .dest-section-title{
    padding:10px 14px 6px; font-size:12px; font-weight:700; letter-spacing:.06em;
    color:var(--text-dim); text-transform:uppercase; border-top:1px solid var(--line);
    background:var(--panel-2);
  }
  .dest-section-title:first-child{ border-top:none; }
  .empty-note{
    padding:18px 14px; font-size:13px; color:var(--text-dim);
  }

  .footnote{
    margin-top:8px; padding:0 4px; font-size:11.5px; color:var(--text-dim); line-height:1.7;
  }
  .footnote a{ color:var(--text-dim); }

  @media (prefers-reduced-motion: reduce){
    .row.soon .eta .blink{ animation:none; }
  }
</style>
</head>

<script>
(function(){
  "use strict";

  var STATIONS = JSON.parse(document.getElementById('station-data').textContent);

  /* ---------- 物理駅単位にグルーピング(仙台駅=南北線/東西線をまとめる) ---------- */
  function groupKey(s){ return s.lat.toFixed(5) + ',' + s.lng.toFixed(5); }
  var groupsMap = {};
  var groupOrder = [];
  STATIONS.forEach(function(s){
    var k = groupKey(s);
    if(!groupsMap[k]){
      groupsMap[k] = { name:s.name, lat:s.lat, lng:s.lng, lines:[] };
      groupOrder.push(k);
    }
    groupsMap[k].lines.push(s);
  });
  var PHYSICAL = groupOrder.map(function(k){ return groupsMap[k]; });

  /* ---------- 距離計算 ---------- */
  function distMeters(lat1,lng1,lat2,lng2){
    var R = 6371000;
    var toRad = function(d){ return d*Math.PI/180; };
    var dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
    var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
            Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)*Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  /* ---------- 日本の祝日判定 ---------- */
  function vernalEquinox(year){
    return Math.floor(20.8431 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  }
  function autumnalEquinox(year){
    return Math.floor(23.2488 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  }
  function nthMonday(year, month, n){
    var d = new Date(year, month-1, 1);
    var count = 0;
    while(true){
      if(d.getDay() === 1){ count++; if(count === n) return new Date(d); }
      d.setDate(d.getDate()+1);
    }
  }
  function dKey(d){
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function baseHolidays(year){
    var list = [];
    function add(m, day){ list.push(new Date(year, m-1, day)); }
    add(1,1);
    list.push(nthMonday(year,1,2));
    add(2,11); add(2,23);
    add(3, vernalEquinox(year));
    add(4,29); add(5,3); add(5,4); add(5,5);
    list.push(nthMonday(year,7,3));
    add(8,11);
    list.push(nthMonday(year,9,3));
    add(9, autumnalEquinox(year));
    list.push(nthMonday(year,10,2));
    add(11,3); add(11,23);
    return list;
  }
  var HOLIDAY_SET_CACHE = {};
  function holidaySetForYear(year){
    if(HOLIDAY_SET_CACHE[year]) return HOLIDAY_SET_CACHE[year];
    var raw = [];
    [year-1, year, year+1].forEach(function(y){ raw = raw.concat(baseHolidays(y)); });
    raw.sort(function(a,b){ return a-b; });
    var set = new Set(raw.map(dKey));
    // 振替休日: 日曜の祝日 → その後の最初の「祝日でない日」を休日にする
    raw.forEach(function(h){
      if(h.getDay() === 0){
        var d = new Date(h);
        do{ d.setDate(d.getDate()+1); } while(set.has(dKey(d)));
        set.add(dKey(d));
      }
    });
    // 国民の休日: 前後を祝日に挟まれた日曜以外の平日
    var d = new Date(year-1, 11, 1);
    var end = new Date(year+1, 1, 28);
    while(d <= end){
      var prev = new Date(d); prev.setDate(prev.getDate()-1);
      var next = new Date(d); next.setDate(next.getDate()+1);
      if(!set.has(dKey(d)) && d.getDay() !== 0 && set.has(dKey(prev)) && set.has(dKey(next))){
        set.add(dKey(d));
      }
      d.setDate(d.getDate()+1);
    }
    HOLIDAY_SET_CACHE[year] = set;
    return set;
  }
  function isHoliday(date){
    return holidaySetForYear(date.getFullYear()).has(dKey(date));
  }
  function scheduleType(date){
    var dow = date.getDay();
    if(dow === 0 || dow === 6) return 'holiday';
    if(isHoliday(date)) return 'holiday';
    return 'weekday';
  }

  /* ---------- 行き先別に次の発車一覧を作る(各count件) ---------- */
  function getUpcomingByDest(stationEntry, fromDate, count){
    var byDest = {};
    Object.keys(stationEntry.directions).forEach(function(dest){ byDest[dest] = []; });
    var dayOffset = 0;
    while(dayOffset < 3){
      var allFull = Object.keys(byDest).every(function(dest){ return byDest[dest].length >= count; });
      if(allFull) break;
      var cursor = new Date(fromDate);
      cursor.setDate(cursor.getDate() + dayOffset);
      var type = scheduleType(cursor);
      var nowMin = dayOffset === 0 ? (fromDate.getHours()*60 + fromDate.getMinutes()) : -1;
      Object.keys(stationEntry.directions).forEach(function(dest){
        if(byDest[dest].length >= count) return;
        var times = stationEntry.directions[dest][type] || [];
        times.forEach(function(t){
          if(byDest[dest].length >= count) return;
          var parts = t.split(':');
          var hh = parseInt(parts[0],10), mm = parseInt(parts[1],10);
          var totalMin = hh*60+mm;
          if(dayOffset === 0 && totalMin <= nowMin) return;
          byDest[dest].push({ dest:dest, time:t, dayOffset:dayOffset, totalMin: dayOffset*1440 + totalMin });
        });
      });
      dayOffset++;
    }
    return byDest;
  }

  /* ---------- 描画 ---------- */
  var LINE_CLASS = { '南北線':'nanboku', '東西線':'tozai' };

  function fmtDist(m){
    if(m == null) return '';
    if(m < 1000) return '現在地から約' + Math.round(m/10)*10 + 'm';
    return '現在地から約' + (m/1000).toFixed(1) + 'km';
  }

  function renderClock(){
    var now = new Date();
    var w = ['日','月','火','水','木','金','土'][now.getDay()];
    document.getElementById('todayLabel').textContent =
      now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日(' + w + ') ' +
      String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    var type = scheduleType(now);
    var tag = document.getElementById('schedTag');
    if(type === 'holiday'){
      tag.textContent = isHoliday(now) && now.getDay()!==0 && now.getDay()!==6 ? '祝日ダイヤ' : '土曜・休日ダイヤ';
      tag.classList.add('holiday');
    } else {
      tag.textContent = '平日ダイヤ';
      tag.classList.remove('holiday');
    }
  }

  var currentGroup = null;
  var currentDistance = null;

  function renderRows(entry, now){
    var byDest = getUpcomingByDest(entry, now, 20);
    var dests = Object.keys(byDest);
    if(dests.length === 0){
      return '<div class="empty-note">本日・翌日の時刻データがありません。</div>';
    }
    return dests.map(function(dest){
      var trains = byDest[dest];
      if(trains.length === 0) return '';
      var rows = trains.map(function(u, i){
        var minutesUntil = Math.round(u.totalMin - (now.getHours()*60 + now.getMinutes() + now.getSeconds()/60));
        var soon = minutesUntil <= 2;
        var dayTag = u.dayOffset > 0 ? '<span class="day-tag">翌日</span>' : '';
        var etaText = minutesUntil <= 0 ? '<span class="blink">まもなく</span>' : 'あと' + minutesUntil + '分';
        return '' +
          '<div class="row' + (soon ? ' soon' : '') + '">' +
            '<span class="rank">' + (i+1) + '</span>' +
            dayTag +
            '<span class="dest">' + dest + '</span>' +
            '<span class="time mono">' + u.time + '</span>' +
            '<span class="eta mono">' + etaText + '</span>' +
          '</div>';
      }).join('');
      return '<div class="dest-section-title">' + dest + '</div>' + rows;
    }).join('');
  }

  function renderApp(){
    if(!currentGroup) return;
    renderClock();
    var now = new Date();
    var head = '<div class="station-head"><span class="name">' + currentGroup.name + '駅</span>' +
      '<span class="dist mono">' + fmtDist(currentDistance) + '</span></div>';

    var blocks = currentGroup.lines.map(function(entry){
      var cls = LINE_CLASS[entry.line] || '';
      return '<div class="line-block ' + cls + '">' +
        '<div class="line-title"><span class="line-badge">' + entry.line + '</span>次の発車予定</div>' +
        renderRows(entry, now) +
        '</div>';
    }).join('');

    document.getElementById('app').innerHTML = head + blocks;
  }

  /* ---------- 駅選択プルダウン ---------- */
  var select = document.getElementById('stationPick');
  PHYSICAL.forEach(function(g, idx){
    var linesLabel = g.lines.map(function(l){ return l.line; }).join('・');
    var opt = document.createElement('option');
    opt.value = idx;
    opt.textContent = g.name + '駅(' + linesLabel + ')';
    select.appendChild(opt);
  });
  select.addEventListener('change', function(){
    currentGroup = PHYSICAL[parseInt(select.value,10)];
    currentDistance = null;
    renderApp();
  });

  /* ---------- 現在地取得 → 最寄り駅 ---------- */
  function pickNearest(lat, lng){
    var best = null, bestDist = Infinity;
    PHYSICAL.forEach(function(g){
      var d = distMeters(lat, lng, g.lat, g.lng);
      if(d < bestDist){ bestDist = d; best = g; }
    });
    return { group: best, dist: bestDist };
  }

  function setStatus(text){
    document.getElementById('statusText').textContent = text;
  }

  function locate(){
    setStatus('現在地を取得しています…');
    if(!('geolocation' in navigator)){
      setStatus('この端末では位置情報が使えないため、下のリストから駅を選んでください。');
      currentGroup = PHYSICAL[0];
      select.value = 0;
      renderApp();
      return;
    }
    navigator.geolocation.getCurrentPosition(function(pos){
      var r = pickNearest(pos.coords.latitude, pos.coords.longitude);
      currentGroup = r.group;
      currentDistance = r.dist;
      var idx = PHYSICAL.indexOf(r.group);
      select.value = idx;
      setStatus('現在地から最寄り駅を表示しています');
      renderApp();
    }, function(err){
      setStatus('位置情報を取得できませんでした。下のリストから駅を選んでください。');
      if(!currentGroup){
        currentGroup = PHYSICAL[0];
        select.value = 0;
        renderApp();
      }
    }, { enableHighAccuracy:true, timeout:10000, maximumAge:60000 });
  }

  document.getElementById('retryBtn').addEventListener('click', locate);

  locate();
  setInterval(renderApp, 15000);
  setInterval(renderClock, 15000);

})();
</script>
</body>
</html>
